<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — InvoiceDE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; }
  .register-box { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 40px; width: 100%; max-width: 540px; box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
  .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .logo-icon { width: 36px; height: 36px; background: #2563eb; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #fff; }
  .logo-name { font-size: 18px; font-weight: 600; color: #0f172a; }
  h2 { font-size: 20px; font-weight: 600; color: #0f172a; margin-bottom: 4px; }
  .sub { font-size: 13.5px; color: #64748b; margin-bottom: 24px; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #94a3b8; margin: 20px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #f1f5f9; }
  .form-row { display: grid; gap: 14px; margin-bottom: 14px; }
  .cols-2 { grid-template-columns: 1fr 1fr; }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 5px; }
  .optional { font-weight: 400; color: #94a3b8; font-size: 11px; }
  input, textarea, select {
    width: 100%; padding: 9px 12px; border: 1px solid #d1d5db;
    border-radius: 7px; font-size: 13.5px; color: #0f172a; background: #fff;
    font-family: 'DM Sans', sans-serif; transition: border-color 0.15s;
  }
  input:focus, textarea:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  textarea { resize: vertical; min-height: 72px; }
  .btn-register { width: 100%; padding: 11px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 20px; transition: background 0.15s; }
  .btn-register:hover { background: #1d4ed8; }
  .back-link { text-align: center; font-size: 13.5px; color: #64748b; margin-top: 16px; }
  .back-link a { color: #2563eb; text-decoration: none; font-weight: 500; }
  .alert-danger { padding: 10px 14px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 7px; color: #dc2626; font-size: 13px; margin-bottom: 14px; }
</style>
</head>
<body>
<div class="register-box">
  <div class="logo-row">
    <div class="logo-icon">ID</div>
    <span class="logo-name">InvoiceDE</span>
  </div>
  <h2>Create your account</h2>
  <p class="sub">Set up your workspace in under a minute</p>
  {% if error %}<div class="alert-danger">{{ error }}</div>{% endif %}
  <form method="POST" action="/auth/register">
    <div class="section-title">Account Information</div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required placeholder="your-username">
      </div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="full_name" required placeholder="Max Mustermann">
      </div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required placeholder="max@company.de">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required placeholder="Choose a strong password" minlength="6">
    </div>

    <div class="section-title">Company Details</div>
    <div class="form-group">
      <label>Company Name</label>
      <input type="text" name="company_name" required placeholder="Mustermann GmbH">
    </div>
    <div class="form-group">
      <label>Company Address</label>
      <textarea name="company_address" placeholder="Musterstraße 1&#10;10115 Berlin"></textarea>
    </div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label>VAT ID <span class="optional">(optional)</span></label>
        <input type="text" name="company_vat_id" placeholder="DE123456789">
      </div>
      <div class="form-group">
        <label>Company Phone <span class="optional">(optional)</span></label>
        <input type="text" name="company_phone" placeholder="+49 30 12345678">
      </div>
    </div>
    <div class="form-group">
      <label>Company Email <span class="optional">(optional)</span></label>
      <input type="email" name="company_email" placeholder="info@company.de">
    </div>
    <button type="submit" class="btn-register">Create Account →</button>
  </form>
  <p class="back-link">Already have an account? <a href="/auth/login">Sign in</a></p>
</div>
</body>
</html>
